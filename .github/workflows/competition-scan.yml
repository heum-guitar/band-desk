name: Competition Scan

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install script dependencies
        working-directory: scripts
        run: npm install

      - name: Scan competitions and update Firebase
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_DATABASE_URL: https://heum-band-default-rtdb.asia-southeast1.firebasedatabase.app
        run: node scan-competitions.js
