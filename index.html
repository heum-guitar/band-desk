<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#20233F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Band Desk">
<title>Band Desk</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icons/icon.svg">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root {
  --c-orange-base: #F9737A;
  --c-orange-dark: #B84E57;
  --c-orange-light: #FFB4A8;
  --c-orange-pale: #FFF1F0;
  --c-blue-base: #5B5CE2;
  --c-blue-dark: #20233F;
  --c-blue-light: #B8B7FF;
  --c-blue-pale: #F0F1FF;
  --c-green-base: #2EBFA5;
  --c-green-pale: #EAF8F4;
  --c-yellow-base: #D9A441;
  --c-yellow-pale: #FFF7E6;
  --c-red-base: #E6545F;
  --c-red-pale: #FFF0F2;
  --c-bg: #F6F7FB;
  --c-surface: #FFFFFF;
  --c-border: rgba(32,35,63,0.09);
  --c-text-main: #20233F;
  --c-text-muted: #6E7284;
  --c-text-inverse: #FFFFFF;
  --radius-lg: 20px;
  --radius-md: 12px;
  --radius-sm: 8px;
  --radius-pill: 99px;
  --space-1: 4px; --space-2: 8px; --space-3: 12px;
  --space-4: 16px; --space-5: 20px; --space-6: 24px; --space-8: 32px;
  --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --nav-safe-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
}

body.dark-mode {
  --c-orange-base: #FF8A8F;
  --c-orange-dark: #7A3C42;
  --c-orange-pale: #3A292B;
  --c-blue-pale: #2A2D34;
  --c-green-pale: #24342E;
  --c-yellow-pale: #343024;
  --c-red-pale: #372729;
  --c-bg: #1C1C1E;
  --c-surface: #2C2C2E;
  --c-border: rgba(255,255,255,0.12);
  --c-text-main: #F2F2F7;
  --c-text-muted: #AEAEB2;
  --c-blue-dark: #3A3A3C;
  --c-blue-base: #A1A1FF;
  --c-blue-light: #5A5A5F;
  --c-green-base: #72D8C4;
  --c-yellow-base: #E2BC73;
  --c-red-base: #FF7A84;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--c-bg);
  overscroll-behavior: none;
}

body {
  font-family: var(--font-family);
  background: var(--c-bg);
  color: var(--c-text-main);
  line-height: 1.5;
  font-size: 15px;
  display: flex;
  justify-content: center;
  width: 100%;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: manipulation;
}

.app-container {
  width: 100%;
  max-width: 428px;
  background: var(--c-bg);
  position: relative;
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  overscroll-behavior: none;
  box-shadow: 0 0 40px rgba(0,0,0,0.08);
}

/* ── Header ── */
.app-header {
  padding: calc(var(--space-4) + var(--safe-top)) var(--space-4) var(--space-2);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--c-bg);
  z-index: 10;
  flex-shrink: 0;
}
.band-selector { display: flex; align-items: center; gap: var(--space-2); cursor: pointer; min-width: 0; }
.brand-text-row { display: flex; align-items: baseline; gap: var(--space-2); min-width: 0; }
.band-avatar {
  width: 32px; height: 32px;
  background: var(--c-blue-dark);
  color: var(--c-surface);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px;
}
h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
h2 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: var(--space-3); }
h3 { font-size: 15px; font-weight: 600; }
.text-sm { font-size: 13px; color: var(--c-text-muted); }
.text-xs { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.text-mono { font-variant-numeric: tabular-nums; font-weight: 500; }

.icon-btn {
  width: 40px; height: 40px;
  border-radius: var(--radius-pill);
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: none;
  color: var(--c-text-main); cursor: pointer; position: relative;
}
.notification-dot {
  position: absolute; top: 8px; right: 10px;
  width: 8px; height: 8px;
  background: var(--c-orange-base);
  border-radius: 50%; border: 2px solid var(--c-bg);
}

/* ── Main / Pages ── */
.main-content { flex: 1; overflow: hidden; position: relative; }
.page {
  position: absolute; inset: 0;
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  padding: var(--space-4) var(--space-4) calc(120px + env(safe-area-inset-bottom, 0px));
  display: none;
  flex-direction: column;
  gap: var(--space-4);
}
.page.active { display: flex; }
.page::-webkit-scrollbar { display: none; }
.page { -ms-overflow-style: none; scrollbar-width: none; }

/* ── Cards ── */
.card {
  background: var(--c-surface);
  border-radius: var(--radius-lg);
  padding: var(--space-4);
  box-shadow: 0 4px 12px rgba(26,26,58,0.03);
  border: 1px solid var(--c-border);
}
.hero-card {
  background:
    radial-gradient(circle at 88% 8%, rgba(255,255,255,0.16), transparent 30%),
    linear-gradient(135deg, var(--c-blue-dark) 0%, var(--c-blue-base) 58%, #8B5CF6 100%);
  color: var(--c-text-inverse);
  border: 1px solid rgba(255,255,255,0.08); position: relative; overflow: clip;
  padding-bottom: var(--space-5);
  box-shadow: 0 12px 28px rgba(91,92,226,0.18);
}
.hero-card::after {
  content: '';
  position: absolute; top: -50%; right: -20%;
  width: 200px; height: 200px;
  background: rgba(255,255,255,0.05); border-radius: 50%;
}
.hero-tag {
  display: inline-block;
  background: rgba(255,255,255,0.2);
  padding: 4px 10px; border-radius: var(--radius-pill);
  margin-bottom: var(--space-3);
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.hero-title { font-size: 24px; font-weight: 700; margin-bottom: var(--space-1); }
.hero-meta {
  display: flex; align-items: center; gap: var(--space-4);
  margin-top: var(--space-4); font-size: 14px; opacity: 0.9;
}
.hero-meta-item { display: flex; align-items: center; gap: var(--space-1); }

/* ── Alert Banner ── */
.alert-banner {
  background: linear-gradient(135deg, var(--c-orange-base) 0%, #FF9F7A 100%);
  color: white;
  padding: var(--space-3) var(--space-4);
  border-radius: var(--radius-md);
  display: flex; align-items: center; gap: var(--space-3);
  cursor: pointer; transition: opacity 0.15s;
  box-shadow: 0 10px 24px rgba(249,115,122,0.18);
}
.alert-banner:active { opacity: 0.85; }
.alert-icon {
  background: rgba(255,255,255,0.2);
  padding: 6px; border-radius: 50%;
  display: flex; flex-shrink: 0;
}

/* ── Grid ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }

/* ── Action Cards ── */
.action-card {
  padding: var(--space-4); border-radius: var(--radius-md);
  display: flex; flex-direction: column; gap: var(--space-2);
  cursor: pointer; border: 1px solid transparent; transition: transform 0.15s;
}
.action-card:active { transform: scale(0.97); }
.action-card.orange { background: var(--c-orange-pale); border-color: rgba(249,115,122,0.16); }
.action-card.orange .action-icon { color: var(--c-orange-base); }
.action-card.blue { background: var(--c-blue-pale); border-color: rgba(91,92,226,0.14); }
.action-card.blue .action-icon { color: var(--c-blue-base); }
.action-card.green { background: var(--c-green-pale); border-color: rgba(46,191,165,0.16); }
.action-card.green .action-icon { color: var(--c-green-base); }
.action-card.yellow { background: var(--c-yellow-pale); border-color: rgba(217,164,65,0.16); }
.action-card.yellow .action-icon { color: var(--c-yellow-base); }
.action-title { font-weight: 600; color: var(--c-text-main); font-size: 14px; }
.action-desc { font-size: 12px; color: var(--c-text-muted); }

/* ── Lists ── */
.list-group { display: flex; flex-direction: column; gap: var(--space-3); }
.list-item {
  display: flex; align-items: center;
  padding: var(--space-3); background: var(--c-bg);
  border-radius: var(--radius-md); gap: var(--space-3);
}
.list-item.surface { background: var(--c-surface); border: 1px solid var(--c-border); }
.list-item.cover-song {
  background: #ECEEF3;
  border: 1px solid rgba(32,35,63,0.08);
}
body.dark-mode .list-item.cover-song {
  background: #343438;
  border-color: rgba(255,255,255,0.10);
}
.item-content { flex: 1; min-width: 0; }
.item-title { font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.item-sub { font-size: 13px; color: var(--c-text-muted); }

/* ── File Badges ── */
.file-actions { display: flex; gap: var(--space-2); }
.file-badge {
  width: 36px; height: 36px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; cursor: pointer;
  transition: all 0.15s; flex-shrink: 0;
}
.file-badge.mp3 { background: var(--c-blue-pale); color: var(--c-blue-base); border: 1px solid rgba(91,92,226,0.14); }
.file-badge.mp3.on { background: var(--c-blue-base); color: var(--c-surface); }
.file-badge.mp3.off { opacity: 0.3; cursor: not-allowed; }
.file-badge.sheet { background: var(--c-orange-pale); color: var(--c-orange-base); border: 1px solid rgba(249,115,122,0.16); }
.file-badge.sheet.on { background: var(--c-orange-base); color: var(--c-surface); }
.file-badge.sheet.off { opacity: 0.3; cursor: not-allowed; }

/* ── Tasks ── */
.task-checkbox {
  width: 22px; height: 22px; border-radius: 6px;
  border: 2px solid var(--c-border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: all 0.15s;
}
.task-item.done .task-checkbox { background: var(--c-orange-base); border-color: var(--c-orange-base); }
.task-item.done .item-title { text-decoration: line-through; color: var(--c-text-muted); }

/* ── Tags ── */
.tag {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: var(--radius-pill);
  font-size: 11px; font-weight: 600; white-space: nowrap;
}
.tag.muted { background: rgba(107,114,128,0.1); color: var(--c-text-muted); }
.tag.orange { background: var(--c-orange-pale); color: var(--c-orange-base); }
.tag.blue { background: var(--c-blue-pale); color: var(--c-blue-base); }
.tag.green { background: var(--c-green-pale); color: var(--c-green-base); }
.tag.red { background: var(--c-red-pale); color: var(--c-red-base); }

/* ── Bottom Nav ── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  max-width: none;
  background: var(--c-surface); border-top: 1px solid var(--c-border);
  display: flex; justify-content: space-around;
  padding: 6px max(0px, calc((100vw - 428px) / 2)) var(--nav-safe-bottom);
  z-index: 20;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  color: var(--c-text-muted); cursor: pointer;
  padding: var(--space-2) var(--space-3);
  background: none; border: none; min-width: 52px;
}
.nav-item.active { color: var(--c-blue-base); }
.nav-icon { width: 24px; height: 24px; }
.nav-label { font-size: 10px; font-weight: 600; }

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: calc(72px + var(--nav-safe-bottom));
  right: max(var(--space-4), calc((100vw - 428px) / 2 + var(--space-4)));
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--c-blue-dark); color: white;
  border: none; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(26,26,58,0.3); cursor: pointer;
  z-index: 15; transition: transform 0.15s;
}
.fab:active { transform: scale(0.94); }

/* ── Section Header ── */
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-3); }
.section-header h2 { margin-bottom: 0; }
.see-all { font-size: 13px; color: var(--c-blue-base); font-weight: 600; cursor: pointer; }

/* ── Tab Bar ── */
.tab-bar {
  display: flex; gap: var(--space-1);
  background: var(--c-surface); padding: var(--space-1);
  border-radius: var(--radius-md); border: 1px solid var(--c-border);
}
.tab-btn {
  flex: 1; padding: 8px var(--space-3); border: none;
  background: transparent; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 600; color: var(--c-text-muted);
  cursor: pointer; transition: all 0.15s;
}
.tab-btn.active { background: var(--c-blue-dark); color: white; }

/* ── Member Chips ── */
.member-chips {
  display: flex; gap: var(--space-2);
  overflow-x: auto; padding-bottom: var(--space-1);
}
.member-chips::-webkit-scrollbar { display: none; }
.member-chip {
  display: flex; align-items: center; gap: var(--space-2);
  padding: 6px 12px; border-radius: var(--radius-pill);
  border: 2px solid var(--c-border); background: var(--c-surface);
  cursor: pointer; white-space: nowrap;
  font-size: 13px; font-weight: 600; color: var(--c-text-muted);
  transition: all 0.15s; flex-shrink: 0;
}
.member-chip-av {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: white;
}

/* ── Calendar ── */
.cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4); }
.cal-month { font-size: 18px; font-weight: 700; }
.cal-nav-btn {
  width: 36px; height: 36px; border-radius: var(--radius-pill);
  border: 1px solid var(--c-border); background: var(--c-surface);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--c-text-main);
}
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-day-label {
  text-align: center; font-size: 11px; font-weight: 600;
  color: var(--c-text-muted); padding: var(--space-1) 0 var(--space-2);
}
.cal-cell {
  aspect-ratio: 1; border-radius: var(--radius-sm);
  display: flex; flex-direction: column; align-items: center;
  justify-content: flex-start; padding: 3px 2px;
  cursor: pointer; transition: background 0.1s; min-height: 42px;
}
.cal-cell:hover { background: rgba(91,92,226,0.06); }
.cal-cell.other { opacity: 0.25; }
.cal-cell.band-event { background: rgba(249,115,122,0.1); }
.cal-cell.selected { background: rgba(91,92,226,0.12); }
.cal-day-num {
  font-size: 13px; font-weight: 600;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; margin-bottom: 2px;
}
.cal-cell.today .cal-day-num { background: var(--c-blue-base); color: white; }
.cal-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; max-width: 30px; }
.cal-dot { width: 5px; height: 5px; border-radius: 50%; }
.cal-event-dot { width: 18px; height: 5px; border-radius: 99px; background: var(--c-orange-base); margin-top: 2px; }

/* ── Notice ── */
.notice-item {
  background: var(--c-surface); border-radius: var(--radius-md);
  padding: var(--space-4); border: 1px solid var(--c-border);
  cursor: pointer; transition: box-shadow 0.15s;
}
.notice-item:active { box-shadow: 0 4px 12px rgba(26,26,58,0.08); }
.notice-item.pinned { border-color: rgba(91,92,226,0.24); }
.notice-hdr { display: flex; align-items: center; gap: var(--space-2); margin-bottom: 6px; }
.notice-preview { font-size: 13px; color: var(--c-text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 4px; }
.notice-footer { display: flex; gap: var(--space-3); margin-top: var(--space-3); font-size: 12px; color: var(--c-text-muted); }

/* ── Competition ── */
.comp-card {
  background: var(--c-surface); border-radius: var(--radius-lg);
  overflow: hidden; border: 1px solid var(--c-border);
  --comp-action: var(--c-orange-base);
}
.comp-header {
  background: linear-gradient(135deg, var(--c-orange-dark) 0%, var(--c-orange-base) 62%, #FF9F7A 100%);
  padding: var(--space-5) var(--space-4); color: white;
}
.comp-card.cool {
  --comp-action: var(--c-blue-base);
}
.comp-card.cool .comp-header {
  background: linear-gradient(135deg, var(--c-blue-dark) 0%, var(--c-blue-base) 62%, var(--c-blue-light) 100%);
}
.comp-card.warm {
  --comp-action: var(--c-orange-base);
}
.comp-body { padding: var(--space-4); }
.comp-row {
  display: flex; justify-content: space-between;
  padding: 10px 0; border-bottom: 1px solid var(--c-border);
  font-size: 14px;
}
.comp-row:last-child { border-bottom: none; }
.comp-row-label { color: var(--c-text-muted); }
.comp-row-value { font-weight: 600; }

/* ── Audio Player ── */
.audio-player {
  background: var(--c-blue-pale); border-radius: var(--radius-md);
  padding: var(--space-3); margin-top: var(--space-3);
  display: flex; align-items: center; gap: var(--space-3);
}
.audio-bar { flex: 1; height: 4px; background: var(--c-blue-light); border-radius: 2px; overflow: hidden; }
.audio-fill { height: 100%; background: var(--c-blue-base); border-radius: 2px; transition: width 0.5s linear; }
.audio-time { font-size: 12px; font-weight: 600; color: var(--c-blue-base); white-space: nowrap; }

/* ── Stats ── */
.stat-row { display: flex; gap: var(--space-3); }
.stat-card {
  flex: 1; background: var(--c-surface); border-radius: var(--radius-md);
  padding: var(--space-4); border: 1px solid var(--c-border); text-align: center;
}
.stat-num { font-size: 24px; font-weight: 700; }
.stat-label { font-size: 12px; color: var(--c-text-muted); margin-top: 2px; }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45); z-index: 50;
  display: none; align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  width: 100%; max-width: 428px; background: var(--c-surface);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  padding: var(--space-6) var(--space-4) calc(var(--space-6) + var(--safe-bottom));
  animation: slideUp 0.28s ease; max-height: 92vh; overflow-y: auto;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; background: var(--c-border); border-radius: 2px; margin: 0 auto var(--space-5); }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: var(--space-5); }

/* ── Forms ── */
.form-group { margin-bottom: var(--space-4); }
.form-label { font-size: 13px; font-weight: 600; color: var(--c-text-muted); margin-bottom: var(--space-2); display: block; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: var(--space-3) var(--space-4);
  border: 1.5px solid var(--c-border); border-radius: var(--radius-md);
  font-family: var(--font-family); font-size: 15px;
  color: var(--c-text-main); background: var(--c-bg); outline: none;
  transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--c-blue-base); }
.form-textarea { resize: none; height: 80px; }
.btn-primary {
  width: 100%; padding: var(--space-4);
  background: var(--c-blue-dark); color: white; border: none;

.btn-primary:active { opacity: 0.85; }

/* ── Toast ── */
.toast {
  position: fixed; top: calc(72px + var(--safe-top)); left: 50%; transform: translateX(-50%);
  background: var(--c-blue-dark); color: white;
  padding: 10px 20px; border-radius: var(--radius-pill);
  font-size: 13px; font-weight: 600; z-index: 100;
  opacity: 0; transition: opacity 0.25s; white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; }

/* ── Song Num ── */
.song-num { font-size: 13px; font-weight: 700; color: var(--c-text-muted); width: 20px; text-align: center; flex-shrink: 0; }

/* ── Member Avatar ── */

  font-weight: 700; font-size: 15px; color: white; flex-shrink: 0;
}
.member-row {

  padding: var(--space-3); background: var(--c-surface);
  border-radius: var(--radius-md); border: 1px solid var(--c-border);
}

svg { fill: currentColor; }

/* ── Login ── */
#login-screen {

.login-input-wrap input {

function dateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function nextDateKey(offset) {
  const date = new Date();
  date.setDate(date.getDate() + offset);
  return dateKey(date);
}

function formatEventDate(value) {
  const date = new Date(`${value}T00:00:00`);
  return new Intl.DateTimeFormat('ko-KR', { month:'long', day:'numeric', weekday:'short' }).format(date);
}

function parseDeadlineDate(value) {
  const match = String(value || '').match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
  if (!match) return null;
  return `${match[1]}-${match[2].padStart(2,'0')}-${match[3].padStart(2,'0')}`;
}

function isCompetitionOpen(competition) {
  const deadline = parseDeadlineDate(competition.deadline);
  return !deadline || deadline >= dateKey(new Date());
}

function competitionNotice(competition) {
  return {
    id: competition.id,
    type: 'competition',
    title: `${competition.title} 공고`,
    content: `접수 마감은 ${competition.deadline}입니다. ${competition.desc}`,
    author: 'Band Desk',
    date: dateKey(new Date()).slice(5).replace('-', '.'),
    pinned: true,
  };
}

function isCoverSong(song) {
  return String(song.artist || '').trim().toLowerCase() !== 'binge watch';
}

function syncCompetitionData() {
  const openCompetitions = mergeCompetitionItems([
    ...getVerifiedCompetitionItems(),
    ...removeSampleCompetitions(COMPETITIONS),
  ]).filter(isCompetitionOpen);
  COMPETITIONS.splice(0, COMPETITIONS.length, ...openCompetitions);
  const openIds = new Set(COMPETITIONS.map(c => String(c.id)));
  const hiddenIds = new Set(hiddenCompetitionNoticeIds.map(String));
  const existingCompetitionNotices = removeSampleCompetitionNotices(notices).filter(n =>
    n.type === 'competition' && openIds.has(String(n.id)) && !hiddenIds.has(String(n.id))
  );
  const existingIds = new Set(existingCompetitionNotices.map(n => String(n.id)));
  const competitionNotices = [
    ...existingCompetitionNotices,
    ...COMPETITIONS.filter(c => !existingIds.has(String(c.id)) && !hiddenIds.has(String(c.id))).map(competitionNotice),
  ];
  notices = [
    ...competitionNotices,
    ...removeSampleCompetitionNotices(notices).filter(n => n.type !== 'competition'),
  ];
}

function mergeCompetitionItems(items) {
  const seen = new Set();
  return (items || []).filter(item => {
    const key = normalizeCompetitionKey(item.title, item.url);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function getDDayLabel(dateValue) {
  if (!dateValue) return '일정 없음';
  const today = new Date(`${dateKey(new Date())}T00:00:00`);
  const eventDate = new Date(`${dateValue}T00:00:00`);
  const diffDays = Math.round((eventDate - today) / 86400000);
  if (diffDays === 0) return 'D-Day';
  if (diffDays > 0) return `D-${diffDays}`;
  return `D+${Math.abs(diffDays)}`;
}

function escapeHtml(value) {

    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',

}

function mergeCompetitionLists(savedCompetitions) {
  const cleanedCompetitions = removeSampleCompetitions(savedCompetitions);
  const seen = new Set(cleanedCompetitions.map(item => item.id || item.title));
  const newDefaults = COMPETITIONS.filter(item => !seen.has(item.id) && !seen.has(item.title));
  return [...cleanedCompetitions, ...newDefaults];
}

function mergeNoticeLists(savedNotices) {
  const cleanedNotices = removeSampleCompetitionNotices(savedNotices);
  const seen = new Set(cleanedNotices.map(item => item.id || item.title));
  const newDefaults = notices.filter(item => !seen.has(item.id) && !seen.has(item.title));
  return [...cleanedNotices, ...newDefaults];
}

function isSampleCompetitionTitle(value) {
  return SAMPLE_COMPETITION_TITLES.some(title => String(value || '').includes(title));
}

function removeSampleCompetitions(items) {
  return (items || [])
    .filter(item => !isSampleCompetitionTitle(item.title))
    .filter(item => !isOutdatedSearchCompetition(item))
    .filter(item => !hasOnlyPastYear(item.title));
}

function removeSampleCompetitionNotices(items) {
  return (items || []).filter(item => !(item.type === 'competition' && isSampleCompetitionTitle(item.title)));
}

function isOutdatedSearchCompetition(item) {
  if (!String(item?.id || '').startsWith('search-')) return false;
  if (!item.sourcePublishedAt) return true;
  const publishedAt = new Date(item.sourcePublishedAt);
  if (Number.isNaN(publishedAt.getTime())) return true;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 180);
  return publishedAt < cutoff;
}

function applyAppState(state) {
  if (Array.isArray(state.songs)) SONGS.splice(0, SONGS.length, ...state.songs);
  if (Array.isArray(state.setlist)) setlist = state.setlist;
  if (Array.isArray(state.notices)) notices = mergeNoticeLists(state.notices);
  if (Array.isArray(state.competitions)) COMPETITIONS.splice(0, COMPETITIONS.length, ...mergeCompetitionLists(state.competitions));
  if (Array.isArray(state.hiddenCompetitionNoticeIds)) hiddenCompetitionNoticeIds = state.hiddenCompetitionNoticeIds;
  if (Array.isArray(state.tasks)) tasks = state.tasks;
  if (state.schedules && typeof state.schedules === 'object') schedules = state.schedules;
  if (Array.isArray(state.bandEvents)) bandEvents = state.bandEvents;
}

function queueCloudSave(state = getAppState()) {
  if (applyingRemoteState) return;
  cloudSavePending = true;
  if (!cloudStateRef || !cloudReady) return;
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(() => {
    cloudSavePending = false;
    cloudStateRef.set(makeCloudPayload(state))
      .then(() => {
        if (cloudConnectedOnce) showToast('공유 저장 완료');
      })
      .catch(error => {
        console.error('Cloud save failed:', error);
        cloudSavePending = true;
        showToast(`공유 저장 실패: ${error.code || '연결 확인'}`);
      });
  }, 150);
}

async function initCloudSync() {
  if (!window.firebase) {
    showToast('Firebase 스크립트를 불러오지 못했습니다');
    return;
  }
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    cloudDb = firebase.database();
    cloudStateRef = cloudDb.ref('bandDesk/sharedState');
    cloudReady = true;

    try {
      const firstSnapshot = await Promise.race([
        cloudStateRef.get(),
        new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 5000)),
      ]);
      if (firstSnapshot.exists()) {
        applyRemotePayload(firstSnapshot.val());
      } else {
        queueCloudSave(getAppState());
      }
    } catch (error) {
      console.warn('Initial realtime load failed:', error);
      if (cloudSavePending) queueCloudSave(getAppState());
    }

    cloudStateRef.on('value', snapshot => {
      if (!snapshot.exists()) {
        queueCloudSave(getAppState());
        return;
      }
      applyRemotePayload(snapshot.val());
    }, error => {
      console.error('Cloud sync failed:', error);
      showToast(`공유 연결 실패: ${error.code || '권한/네트워크 확인'}`);
    });
  } catch (error) {
    console.error('Firebase init failed:', error);
    showToast(`Firebase 시작 실패: ${error.code || '설정 확인'}`);
  }
}

function applyRemotePayload(remoteData) {
  const remoteState = remoteData?.state;
  if (!remoteState) return;
  const remoteSavedAt = Number(remoteData.savedAt || 0);
  if (remoteSavedAt && remoteSavedAt < lastAppliedRemoteSavedAt) return;
  applyingRemoteState = true;
  applyAppState(remoteState);
  syncCompetitionData();
  localStorage.setItem(APP_STATE_KEY, JSON.stringify(getAppState()));
  applyingRemoteState = false;
  lastAppliedRemoteSavedAt = Math.max(lastAppliedRemoteSavedAt, remoteSavedAt);
  refreshVisibleData();
  if (!cloudConnectedOnce) {
    cloudConnectedOnce = true;
    showToast('공유 데이터에 연결됐습니다');
  }
}

    if (result === 'granted') preparePushSubscription();

async function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) return null;
  try {
    const registration = await navigator.serviceWorker.register(`./service-worker.js?v=${APP_BUILD}`);
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshingForUpdate) return;
      refreshingForUpdate = true;
      window.location.reload();
    });
    registration.addEventListener('updatefound', () => {
      const worker = registration.installing;
      if (!worker) return;
      worker.addEventListener('statechange', () => {
        if (worker.state === 'installed' && navigator.serviceWorker.controller) {
          worker.postMessage({ type: 'SKIP_WAITING' });
        }
      });
    });
    if (registration.waiting) {
      registration.waiting.postMessage({ type: 'SKIP_WAITING' });
    }
    setInterval(() => registration.update(), 60 * 60 * 1000);
    registration.update();
    return registration;
  } catch {
    showToast('앱 설치 준비를 완료하지 못했습니다');
    return null;
  }
}

async function preparePushSubscription() {
  const registration = await navigator.serviceWorker?.ready;
  if (!registration || !('PushManager' in window)) return null;
  // 추후 서버와 VAPID 공개키가 준비되면 여기에서 pushManager.subscribe()를 호출하고 구독 정보를 저장합니다.
  return registration;
}

function getNextBandEvent() {
  const today = dateKey(new Date());
  return [...bandEvents]
    .filter(event => event.date >= today)
    .sort((a,b) => `${a.date} ${a.time || ''}`.localeCompare(`${b.date} ${b.time || ''}`))[0] || null;
}

function renderNextBandEvent() {
  const event = getNextBandEvent();
  setText('next-event-kind', event
    ? (event.type === 'performance' ? '다음 공연 일정' : '다음 정기 합주')
    : '다음 정기 합주');
  setText('next-event-title', event
    ? `${formatEventDate(event.date)} ${event.time || ''}`.trim()
    : '등록된 일정 없음');
  setText('next-event-place', event
    ? `${event.title}${event.place ? ' · ' + event.place : ''}`
    : '조진흠 리더 계정에서 일정을 등록해 주세요');
  setText('next-event-dday', getDDayLabel(event?.date));
}

function openNextBandEventEditor() {
  const event = getNextBandEvent();
  selectedDate = event?.date || dateKey(new Date());
  const targetDate = new Date(`${selectedDate}T00:00:00`);
  calDate = new Date(targetDate.getFullYear(), targetDate.getMonth(), 1);
  navigateTo('calendar');
}

function sameId(a, b) {
  return String(a) === String(b);
}

function openNotice(id) {
  const n = notices.find(x => sameId(x.id, id));
  if (!n) return;
  const noticeId = JSON.stringify(id);
  const tc = { schedule:'blue', general:'muted', competition:'orange' };
  const tl = { schedule:'일정', general:'일반', competition:'대회' };
  showModal(`
    <div style="margin-bottom:var(--space-3)"><span class="tag ${tc[n.type]}">${tl[n.type]}</span></div>

    </div>
    <div style="display:flex;gap:var(--space-2);margin-top:var(--space-5)">

  `);
}

function escapeAttr(value = '') {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('"', '&quot;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;');
}

function toggleSetlist(songId) {
  if (!requireLeader()) return;
  setlist = setlist.includes(songId) ? setlist.filter(id => id !== songId) : [...setlist, songId];
  saveAppState();
  renderLibrary();
  renderSetlistView();
  renderHome();
  showToast(setlist.includes(songId) ? '합주곡 목록에서 제거했습니다' : '합주곡에 추가했습니다');
}

function togglePlay(songId) {
  if (playingId === songId) {
    clearInterval(audioTimer);
    playingId = null; audioSec = 0;
  } else {
    clearInterval(audioTimer);
    playingId = songId; audioSec = 0;
    audioTimer = setInterval(() => {
      audioSec++;
      const fill = document.getElementById('afill-' + songId);
      const time = document.getElementById('atime-' + songId);
      const pct = Math.min((audioSec / 210) * 100, 100);
      if (fill) fill.style.width = pct + '%';
      if (time) {
        const m = Math.floor(audioSec/60), s = audioSec%60;
        time.textContent = `${m}:${String(s).padStart(2,'0')}`;
      }
      if (audioSec >= 210) { clearInterval(audioTimer); playingId = null; audioSec = 0; renderLibrary(); renderHome(); }
    }, 1000);
  }
  renderLibrary(); renderHome(); renderSetlistView();
}

function openSheet(songId) {
  const s = SONGS.find(x => x.id === songId);
  showModal(`
    <div class="modal-title">${s.title} — 악보</div>
    <div style="background:var(--c-orange-pale);border-radius:var(--radius-md);padding:var(--space-8);text-align:center;margin-bottom:var(--space-5)">

  `);
}

}

function selectMember(mid) { activeMember = mid; renderTasks(); }

function renderTaskList() {
  const mt = tasks.filter(t => t.mid === activeMember);
  const el = document.getElementById('task-list');
  if (!mt.length) {
    el.innerHTML = '<div style="text-align:center;color:var(--c-text-muted);padding:var(--space-8)">할 일이 없습니다</div>';
    updateLeaderControls();
    return;
  }
  const pending = mt.filter(t => !t.done);
  const done    = mt.filter(t =>  t.done);
  let h = '';
  if (pending.length) {
    h += `<div style="font-size:11px;font-weight:600;color:var(--c-text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">진행 중 ${pending.length}</div>`;
    h += pending.map(t => taskHTML(t)).join('');
  }
  if (done.length) {
    h += `<div style="font-size:11px;font-weight:600;color:var(--c-text-muted);text-transform:uppercase;letter-spacing:.5px;margin:var(--space-4) 0 4px">완료 ${done.length}</div>`;
    h += done.map(t => taskHTML(t)).join('');
  }
  el.innerHTML = h;
  updateLeaderControls();
}

function taskHTML(t) {
  return `
    <div class="list-item surface task-item ${t.done?'done':''}" id="task-${t.id}">
      <div class="task-checkbox" onclick="toggleTask(${t.id})">${t.done?I.check:''}</div>
      <div class="item-content">
        <div class="item-title">${t.title}</div>
        <div class="item-sub text-mono">기한: ${t.dl}</div>
      </div>
      ${isLeader() ? `<button onclick="delTask(${t.id})" style="background:none;border:none;color:var(--c-text-muted);cursor:pointer;padding:4px;display:flex">${I.del}</button>` : ''}
    </div>
  `;
}

function toggleTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  saveAppState();
  renderTaskList();
  renderHome();
  showToast(t.done ? '완료 처리했습니다 ✓' : '미완료로 변경했습니다');
}

function delTask(id) {
  if (!requireLeader()) return;
  tasks = tasks.filter(t => t.id !== id);
  saveAppState();
  renderTaskList();
  renderHome();
  showToast('삭제했습니다');
}

// ═══════════════ CALENDAR ═══════════════
function renderCalendar() {
  const y = calDate.getFullYear(), m = calDate.getMonth();
  document.getElementById('cal-label').textContent = `${y}년 ${m+1}월`;

  const today = new Date();
  const firstDow = new Date(y, m, 1).getDay();
  const daysInM  = new Date(y, m+1, 0).getDate();
  const prevDays = new Date(y, m, 0).getDate();

  const LABELS = ['일','월','화','수','목','금','토'];
  let html = LABELS.map(d => `<div class="cal-day-label">${d}</div>`).join('');

  for (let i = firstDow-1; i >= 0; i--)
    html += `<div class="cal-cell other"><div class="cal-day-num">${prevDays-i}</div></div>`;

  for (let d = 1; d <= daysInM; d++) {
    const key = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = today.getFullYear()===y && today.getMonth()===m && today.getDate()===d;
    const sc = (schedules[key]||[]).filter(id => calFilter.includes(id));
    const dayEvents = bandEvents.filter(event => event.date === key);
    const isSel = key === selectedDate;
    const dots = sc.slice(0,5).map(id => {
      const mm = MEMBERS.find(x => x.id===id);
      return `<div class="cal-dot" style="background:${mm?mm.color:'#ccc'}"></div>`;
    }).join('');
    html += `
      <div class="cal-cell ${isToday?'today':''} ${dayEvents.length?'band-event':''} ${isSel?'selected':''}"
           onclick="selectDay('${key}',${d})">
        <div class="cal-day-num">${d}</div>
        <div class="cal-dots">${dots}</div>
        ${dayEvents.length ? '<div class="cal-event-dot"></div>' : ''}
      </div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;

  // filter chips
  document.getElementById('cal-filter').innerHTML = MEMBERS.map(m => `
    <div class="member-chip ${calFilter.includes(m.id)?'active':''}"
         style="color:${calFilter.includes(m.id)?m.color:'var(--c-text-muted)'};border-color:${calFilter.includes(m.id)?m.color:'var(--c-border)'}"
         onclick="toggleCalFilter('${m.id}')">
      <div class="member-chip-av" style="background:${calFilter.includes(m.id)?m.color:'#ccc'}">${m.short}</div>
      ${m.name} · ${m.instrument}${m.id===currentUserId?' (나)':''}
    </div>
  `).join('');

  if (selectedDate) showDayDetail(selectedDate);
  updateLeaderControls();
}

function selectDay(key, d) {
  selectedDate = key;
  showDayDetail(key);
  renderCalendar();
}

  document.getElementById('cal-detail').style.display = 'block';
  updateLeaderControls();
}

function toggleCalFilter(id) {

    showToast('달력에서 날짜를 먼저 선택하세요');

  }

  showModal(`

    <div style="font-size:13px;color:var(--c-text-muted);line-height:1.6;margin-bottom:var(--space-4)">
      ${isLeader() ? '리더 계정으로 모든 멤버의 참석 가능 여부를 관리합니다.' : '내 일정만 수정할 수 있습니다.'}

    <div class="form-group">
      <label class="form-label">참석 멤버</label>
      <div style="display:flex;flex-direction:column;gap:var(--space-2)" id="sched-checks">
        ${editableMembers.map(mm => {

function saveSchedule() {
  if (!currentUserId) {
    showToast('로그인 후 일정을 수정할 수 있습니다');
    return;
  }
  const checks = document.querySelectorAll('#sched-checks input[type=checkbox]');
  const selected = [...checks].filter(c => c.checked).map(c => c.value);
  if (selectedDate) {
    if (isLeader()) {
      schedules[selectedDate] = selected;
    } else {
      const existing = schedules[selectedDate] || [];
      schedules[selectedDate] = selected.includes(currentUserId)
        ? [...new Set([...existing, currentUserId])]
        : existing.filter(id => id !== currentUserId);
    }
  }
  saveAppState();
  closeModal();
  renderCalendar();
  showToast('일정을 저장했습니다');
}

async function scanCompetitionNotice() {
  if (!requireLeader()) return;
  const button = document.getElementById('leader-competition-scan');
  const originalText = button?.textContent || '새 대회 공고 확인';
  if (button) {
    button.disabled = true;
    button.textContent = '검색 중...';
  }
  try {
    const found = await searchCurrentCompetitions();
    const existingKeys = new Set(COMPETITIONS.map(c => normalizeCompetitionKey(c.title, c.url)));
    const newItems = found.filter(c => !existingKeys.has(normalizeCompetitionKey(c.title, c.url)));

    if (newItems.length) {
      COMPETITIONS.unshift(...newItems);
      syncCompetitionData();
      saveAppState();
      renderCompetitions();
      renderNotices();
      showToast(`새 공고 ${newItems.length}개를 정리했습니다`);
    } else {
      renderCompetitions();
      showToast(found.length ? '이미 등록된 공고입니다' : '검색된 새 공고가 없습니다');
    }
  } catch (error) {
    console.error(error);
    showToast('공고 검색에 실패했습니다');
  } finally {
    if (button) {
      button.disabled = false;
      button.textContent = originalText;
    }
  }
}

async function searchCurrentCompetitions() {
  const [verified, mule, feeds] = await Promise.all([
    Promise.resolve(getVerifiedCompetitionItems()),
    fetchMuleCompetitions().catch(() => []),
    Promise.allSettled(COMPETITION_SEARCH_QUERIES.map(fetchCompetitionFeed)),
  ]);
  const newsItems = feeds.flatMap(result => result.status === 'fulfilled' ? result.value : []);
  const items = [...verified, ...mule, ...newsItems];
  const seen = new Set();
  return items
    .map(item => item.status ? item : buildCompetitionFromSearchItem(item))
    .filter(Boolean)
    .filter(isCompetitionOpen)
    .filter(item => {
      const key = normalizeCompetitionKey(item.title, item.url);
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    })
    .slice(0, 8);
}

function getVerifiedCompetitionItems() {
  return VERIFIED_COMPETITION_ITEMS
    .map(item => ({ ...item, foundAt: new Date().toISOString() }))
    .filter(isCompetitionOpen);
}

async function fetchMuleCompetitions() {
  const lists = await Promise.allSettled(MULE_COMPETITION_URLS.map(fetchMuleCompetitionList));
  const candidates = lists
    .flatMap(result => result.status === 'fulfilled' ? result.value : [])
    .filter(isRelevantCompetitionResult)
    .slice(0, 12);
  const details = await Promise.allSettled(candidates.map(fetchMuleCompetitionDetail));
  return details
    .map((result, index) => result.status === 'fulfilled' ? result.value : buildCompetitionFromSearchItem(candidates[index]))
    .filter(Boolean);
}

async function fetchMuleCompetitionList(url) {
  const text = await fetchTextWithProxy(url, 9000);
  const doc = new DOMParser().parseFromString(text, 'text/html');
  return [...doc.querySelectorAll('a[href*="contest"]')]
    .map(link => {
      const title = cleanText(link.textContent);
      const href = link.getAttribute('href') || '';
      const rowText = cleanText(link.closest('tr, li, div')?.textContent || title);
      return {
        title,
        url: toAbsoluteUrl(href, 'https://www.mule.co.kr'),
        source: '중고악기 뮬',
        publishedAt: '',
        summary: rowText,
      };
    })
    .filter(item => item.title.length > 8 && item.url.includes('mule.co.kr'))
    .filter(item => !/공지|오디션은 공개오디션|페이는 정확하게/.test(item.title));
}

async function fetchMuleCompetitionDetail(item) {
  const text = await fetchTextWithProxy(item.url, 9000);
  const doc = new DOMParser().parseFromString(text, 'text/html');
  const pageText = cleanText(doc.body?.textContent || item.summary);
  return buildCompetitionFromSearchItem({
    ...item,
    summary: pageText.slice(0, 1800),
  });
}

async function fetchCompetitionFeed(query) {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 180);
  const searchQuery = `${query} after:${dateKey(cutoff)}`;
  const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(searchQuery)}&hl=ko&gl=KR&ceid=KR:ko`;
  const text = await fetchTextWithProxy(rssUrl);
  const doc = new DOMParser().parseFromString(text, 'application/xml');
  return [...doc.querySelectorAll('item')].map(item => ({
    title: cleanFeedTitle(item.querySelector('title')?.textContent || ''),
    url: item.querySelector('link')?.textContent || '',
    source: item.querySelector('source')?.textContent || '검색 결과',
    publishedAt: item.querySelector('pubDate')?.textContent || '',
    summary: stripHtml(item.querySelector('description')?.textContent || ''),
  })).filter(isFreshSearchItem).filter(isRelevantCompetitionResult);
}

async function fetchTextWithProxy(url, timeout = 12000) {
  const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);
  try {
    const response = await fetch(proxyUrl, { cache: 'no-store', signal: controller.signal });
    if (!response.ok) throw new Error(`검색 서버 응답 오류: ${response.status}`);
    return await response.text();
  } finally {
    clearTimeout(timer);
  }
}

function buildCompetitionFromSearchItem(item) {
  const combined = `${item.title} ${item.summary}`;
  const deadline = inferDeadline(combined);
  const parsedDeadline = parseDeadlineDate(deadline);
  const sourceType = item.sourceType || (String(item.url || '').includes('mule.co.kr') ? 'mule' : 'search');
  return {
    id: hashString(`${item.title}|${item.url}`),
    sourceType,
    foundAt: new Date().toISOString(),
    sourcePublishedAt: item.publishedAt,
    status: !parsedDeadline || parsedDeadline >= dateKey(new Date()) ? 'open' : 'planned',
    title: item.title || '대회 공고',
    organizer: item.source || '검색 결과',
    date: inferEventDate(combined) || '원문 확인 필요',
    deadline: deadline || '원문 확인 필요',
    venue: inferVenue(combined) || '원문 확인 필요',
    prize: inferPrize(combined) || '원문 확인 필요',
    url: item.url,
    desc: summarizeCompetitionText(combined),
  };
}

function isRelevantCompetitionResult(item) {
  const text = `${item.title} ${item.summary}`;
  const title = String(item.title || '');
  return /밴드|실용음악|버스킹|음악|가요|락|록/i.test(text)
    && /대회|경연|공모|모집|접수|콘테스트/i.test(text)
    && !/모집완료|\[마감\]|\(마감\)|게시중단|임시조치/i.test(title)
    && !hasOnlyPastYear(text);
}

function isFreshSearchItem(item) {
  if (!item.publishedAt) return true;
  const publishedAt = new Date(item.publishedAt);
  if (Number.isNaN(publishedAt.getTime())) return true;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 180);
  return publishedAt >= cutoff;
}

function hasOnlyPastYear(text) {
  const years = [...String(text || '').matchAll(/\b(20\d{2})\b/g)].map(match => Number(match[1]));
  if (!years.length) return false;
  const currentYear = new Date().getFullYear();
  return years.every(year => year < currentYear);
}

function cleanFeedTitle(value) {
  return String(value || '').replace(/\s+-\s+[^-]+$/, '').trim();
}

function stripHtml(value) {
  const doc = new DOMParser().parseFromString(String(value || ''), 'text/html');
  return (doc.body.textContent || '').replace(/\s+/g, ' ').trim();
}

function cleanText(value) {
  return String(value || '').replace(/\s+/g, ' ').trim();
}

function toAbsoluteUrl(value, base) {
  try {
    return new URL(value, base).href;
  } catch {
    return '';
  }
}

function inferDeadline(text) {
  const matches = findKoreanDates(text);
  const deadlineContext = /(마감|접수|신청|모집|까지|기한|deadline)/i;
  const contextual = matches.find(match => deadlineContext.test(text.slice(Math.max(0, match.index - 20), match.index + 40)));
  return formatFoundDate(contextual || matches[0]);
}

function inferEventDate(text) {
  const matches = findKoreanDates(text);
  const eventContext = /(개최|일시|일정|본선|예선|공연|행사|대회)/i;
  const contextual = matches.find(match => eventContext.test(text.slice(Math.max(0, match.index - 20), match.index + 40)));
  return formatFoundDate(contextual);
}

function findKoreanDates(text) {
  const nowYear = new Date().getFullYear();
  const pattern = /(?:(20\d{2})\s*[년.\-/]\s*)?(\d{1,2})\s*[월.\-/]\s*(\d{1,2})\s*일?/g;
  return [...String(text || '').matchAll(pattern)].map(match => ({
    index: match.index || 0,
    year: match[1] || String(nowYear),
    month: match[2],
    day: match[3],
  }));
}

function formatFoundDate(found) {
  if (!found) return '';
  return `${found.year}. ${String(found.month).padStart(2, '0')}. ${String(found.day).padStart(2, '0')}`;
}

function inferVenue(text) {
  const match = String(text || '').match(/(?:장소|공연장|개최지|venue)\s*[:：]?\s*([^.,\n]{2,28})/i);
  return match ? match[1].trim() : '';
}

function inferPrize(text) {
  const match = String(text || '').match(/(?:총상금|상금|시상|대상)\s*[:：]?\s*([^.,\n]{2,32})/i);
  return match ? match[0].trim() : '';
}

function summarizeCompetitionText(text) {
  const cleaned = String(text || '').replace(/\s+/g, ' ').trim();
  if (!cleaned) return '검색 결과에서 가져온 공고입니다. 자세한 참가 조건은 원문에서 확인하세요.';
  return cleaned.length > 130 ? `${cleaned.slice(0, 130)}...` : cleaned;
}

function normalizeCompetitionKey(title, url) {
  return `${String(title || '').replace(/\s+/g, '').toLowerCase()}|${String(url || '').split('?')[0]}`;
}

function hashString(value) {
  let hash = 0;
  for (let i = 0; i < value.length; i += 1) {
    hash = ((hash << 5) - hash) + value.charCodeAt(i);
    hash |= 0;
  }
  return `search-${Math.abs(hash)}`;
}

    <div class="form-group">
      <label class="form-label">종류</label>
      <select class="form-select" id="n-type">
        <option value="schedule">일정</option>
        <option value="general">일반</option>
        <option value="competition">대회</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">제목</label>
      <input class="form-input" id="n-title" placeholder="공지 제목 입력" />
    </div>
    <div class="form-group">
      <label class="form-label">내용</label>
      <textarea class="form-textarea" id="n-content" placeholder="공지 내용 입력"></textarea>
    </div>
    <div class="form-group" style="display:flex;align-items:center;gap:var(--space-3)">
      <input type="checkbox" id="n-pinned" style="accent-color:var(--c-blue-base)">
      <label for="n-pinned" style="font-size:14px;font-weight:500;cursor:pointer">상단 고정</label>
    </div>
    <button class="btn-primary" onclick="submitNotice()">공지 올리기</button>
  `);
}

function submitNotice() {
  if (!requireLeader()) return;
  const title = document.getElementById('n-title').value.trim();
  if (!title) { showToast('제목을 입력하세요'); return; }
  notices.unshift({
    id: Date.now(), type: document.getElementById('n-type').value,
    title, content: document.getElementById('n-content').value.trim() || '내용 없음',
    author: MEMBERS.find(m=>m.id===currentUserId)?.name || '알 수 없음', date:'오늘',
    pinned: document.getElementById('n-pinned').checked,
  });
  saveAppState();
  closeModal();
  renderNotices();
  showToast('공지가 등록되었습니다');
}

function openEditNotice(id) {
  if (!requireLeader()) return;
  const n = notices.find(x => sameId(x.id, id));
  if (!n) return;
  const noticeId = JSON.stringify(id);
  showModal(`
    <div class="modal-title">공지 수정</div>
    <div class="form-group">
      <label class="form-label">종류</label>
      <select class="form-select" id="edit-n-type">
        <option value="schedule" ${n.type === 'schedule' ? 'selected' : ''}>일정</option>
        <option value="general" ${n.type === 'general' ? 'selected' : ''}>일반</option>
        <option value="competition" ${n.type === 'competition' ? 'selected' : ''}>대회</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">제목</label>
      <input class="form-input" id="edit-n-title" value="${escapeAttr(n.title)}" />
    </div>
    <div class="form-group">
      <label class="form-label">내용</label>
      <textarea class="form-textarea" id="edit-n-content">${escapeAttr(n.content)}</textarea>
    </div>
    <div class="form-group" style="display:flex;align-items:center;gap:var(--space-3)">
      <input type="checkbox" id="edit-n-pinned" ${n.pinned ? 'checked' : ''} style="accent-color:var(--c-blue-base)">
      <label for="edit-n-pinned" style="font-size:14px;font-weight:500;cursor:pointer">상단 고정</label>
    </div>
    <div style="display:flex;gap:var(--space-2)">
      <button class="btn-primary" onclick="submitNoticeEdit(${noticeId})" style="background:var(--c-blue-base);flex:1">저장</button>
      <button class="btn-primary" onclick="deleteNotice(${noticeId})" style="background:var(--c-red-base);flex:1">삭제</button>
    </div>
  `);
}

function submitNoticeEdit(id) {
  if (!requireLeader()) return;
  const title = document.getElementById('edit-n-title').value.trim();
  if (!title) { showToast('제목을 입력하세요'); return; }
  let updated = false;
  notices = notices.map(n => {
    if (!sameId(n.id, id)) return n;
    updated = true;
    return {
    ...n,
    type: document.getElementById('edit-n-type').value,
    title,
    content: document.getElementById('edit-n-content').value.trim() || '내용 없음',
    pinned: document.getElementById('edit-n-pinned').checked,
    };
  });
  if (!updated) {
    showToast('수정할 공지를 찾지 못했습니다');
    return;
  }
  saveAppState();
  closeModal();
  renderNotices();
  renderHome();
  showToast('공지를 수정했습니다');
}

function deleteNotice(id) {
  if (!requireLeader()) return;
  const notice = notices.find(n => sameId(n.id, id));
  if (notice?.type === 'competition') {
    hiddenCompetitionNoticeIds = [...new Set([...hiddenCompetitionNoticeIds, id])];
  }
  notices = notices.filter(n => !sameId(n.id, id));
  saveAppState();
  closeModal();
  renderNotices();
  renderHome();
  showToast('공지를 삭제했습니다');
}

function openAddTask() {
  if (!requireLeader()) return;
  const m = MEMBERS.find(x => x.id === activeMember);
  showModal(`
    <div class="modal-title">할 일 추가</div>
    <div style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3);background:var(--c-bg);border-radius:var(--radius-md);margin-bottom:var(--space-5)">
      <div class="member-av" style="background:${m.color}">${m.short}</div>
      <div>
        <div style="font-weight:600">${m.name}</div>
        <div style="font-size:13px;color:var(--c-text-muted)">${m.instrument}${m.id === LEADER_ID ? ' · 리더' : ''}</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">할 일</label>
      <input class="form-input" id="t-title" placeholder="할 일을 입력하세요" />
    </div>
    <div class="form-group">
      <label class="form-label">기한</label>
      <input class="form-input" id="t-dl" placeholder="예: 10.30" />
    </div>
    <button class="btn-primary" onclick="submitTask()">추가하기</button>
  `);
}

function submitTask() {
  if (!requireLeader()) return;
  const title = document.getElementById('t-title').value.trim();
  if (!title) { showToast('할 일을 입력하세요'); return; }
  tasks.push({ id: Date.now(), mid: activeMember, title, dl: document.getElementById('t-dl').value.trim() || '-', done: false });
  saveAppState();
  closeModal();
  renderTaskList();
  renderHome();
  showToast('할 일이 추가되었습니다');
}

// ═══════════════ SONGS: add song ═══════════════
function openAddSong() {
  if (!requireLeader()) return;
  showModal(`
    <div class="modal-title">곡 추가</div>
    <div class="form-group">
      <label class="form-label">곡 제목</label>
      <input class="form-input" id="s-title" placeholder="곡 제목 입력" />
    </div>
    <div class="form-group">
      <label class="form-label">아티스트</label>
      <input class="form-input" id="s-artist" placeholder="아티스트명 입력" />
    </div>
    <div class="form-group">
      <label class="form-label">MP3 파일</label>
      <input class="form-input" id="s-mp3-file" type="file" accept="audio/*" />
    </div>
    <div class="form-group">
      <label class="form-label">리드시트 파일</label>
      <input class="form-input" id="s-sheet-file" type="file" accept=".pdf,.png,.jpg,.jpeg" />
    </div>
    <button class="btn-primary" onclick="submitSong()">곡 추가</button>
  `);
}

function submitSong() {
  if (!requireLeader()) return;
  const title = document.getElementById('s-title').value.trim();
  if (!title) { showToast('곡 제목을 입력하세요'); return; }
  SONGS.push({
    id: Date.now(),
    title,
    artist: document.getElementById('s-artist').value.trim() || '알 수 없음',
    mp3: document.getElementById('s-mp3-file').files.length > 0,
    sheet: document.getElementById('s-sheet-file').files.length > 0,
    mp3Name: document.getElementById('s-mp3-file').files[0]?.name || '',
    sheetName: document.getElementById('s-sheet-file').files[0]?.name || '',
  });
  saveAppState();
  closeModal();
  renderSongs();
  renderHome();
  showToast('곡이 추가되었습니다');
}

function openEditSong(songId) {
  if (!requireLeader()) return;
  const song = SONGS.find(s => s.id === songId);
  if (!song) return;
  showModal(`
    <div class="modal-title">곡 자료 수정</div>
    <div style="padding:var(--space-3);background:var(--c-bg);border-radius:var(--radius-md);margin-bottom:var(--space-5)">
      <div style="font-weight:700">${song.title}</div>
      <div style="font-size:13px;color:var(--c-text-muted);margin-top:2px">${song.artist || '아티스트 미입력'}</div>
    </div>
    <div class="form-group">
      <label class="form-label">MP3 상태</label>
      <select class="form-select" id="edit-mp3-state">
        <option value="keep" ${song.mp3?'selected':''}>현재 상태 유지${song.mp3 ? ` · ${song.mp3Name || 'MP3 있음'}` : ' · 없음'}</option>
        <option value="remove">MP3 제거</option>
        <option value="add">새 MP3 넣기</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">새 MP3 파일</label>
      <input class="form-input" id="edit-mp3-file" type="file" accept="audio/*" />
    </div>
    <div class="form-group">
      <label class="form-label">악보 상태</label>
      <select class="form-select" id="edit-sheet-state">
        <option value="keep" ${song.sheet?'selected':''}>현재 상태 유지${song.sheet ? ` · ${song.sheetName || '악보 있음'}` : ' · 없음'}</option>
        <option value="remove">악보 제거</option>
        <option value="add">새 악보 넣기</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">새 리드시트 파일</label>
      <input class="form-input" id="edit-sheet-file" type="file" accept=".pdf,.png,.jpg,.jpeg" />
    </div>
    <button class="btn-primary" onclick="saveSongFiles(${song.id})">저장</button>
  `);
}

function saveSongFiles(songId) {
  if (!requireLeader()) return;
  const song = SONGS.find(s => s.id === songId);
  if (!song) return;
  const mp3State = document.getElementById('edit-mp3-state').value;
  const sheetState = document.getElementById('edit-sheet-state').value;
  const mp3File = document.getElementById('edit-mp3-file').files[0];
  const sheetFile = document.getElementById('edit-sheet-file').files[0];

  if (mp3State === 'remove') {
    song.mp3 = false;
    song.mp3Name = '';
  }
  if (mp3State === 'add') {
    song.mp3 = true;
    song.mp3Name = mp3File?.name || 'MP3';
  }
  if (sheetState === 'remove') {
    song.sheet = false;
    song.sheetName = '';
  }
  if (sheetState === 'add') {
    song.sheet = true;
    song.sheetName = sheetFile?.name || '악보';
  }

  saveAppState();
  closeModal();
  renderSongs();
  renderHome();
  showToast('곡 자료를 수정했습니다');
}

// ═══════════════ INIT ═══════════════
initTheme();
loadAppState();
registerServiceWorker();
initLogin();
initCloudSync();
</script>
</body>
</html>
